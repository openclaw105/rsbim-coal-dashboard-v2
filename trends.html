<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趋势监测 - RSBIM 储罐监测 v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>

    <header class="header">
        <div class="header-left">
            <h1 class="header-title"><span class="logo">🏭</span>RSBIM 储罐监测</h1>
            <nav class="nav-menu">
                <a href="index.html" class="nav-btn"><span class="nav-icon">🏠</span>首页</a>
                <a href="data.html" class="nav-btn"><span class="nav-icon">📊</span>综合数据</a>
                <a href="trends.html" class="nav-btn active"><span class="nav-icon">📈</span>趋势监测</a>
                <a href="history.html" class="nav-btn"><span class="nav-icon">📜</span>历史数据</a>
                <a href="sensors.html" class="nav-btn"><span class="nav-icon">📡</span>传感器运维</a>
                <a href="settings.html" class="nav-btn"><span class="nav-icon">⚙️</span>系统设置</a>
            </nav>
        </div>
        <div class="header-right">
            <span class="header-time" id="currentTime"></span>
            <span class="header-status"><span class="status-dot online"></span>系统运行正常</span>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat-card"><div class="label">储罐总数</div><div class="value">5</div><div class="unit">座</div></div>
        <div class="stat-card"><div class="label">传感器</div><div class="value">128</div><div class="unit">个</div></div>
        <div class="stat-card"><div class="label">在线率</div><div class="value">99%</div><div class="unit">%</div></div>
        <div class="stat-card"><div class="label">应变均值</div><div class="value">12.5</div><div class="unit">με</div></div>
        <div class="stat-card"><div class="label">倾斜均值</div><div class="value">0.02</div><div class="unit">°</div></div>
        <div class="stat-card"><div class="label">沉降均值</div><div class="value">8.3</div><div class="unit">mm</div></div>
        <div class="stat-card"><div class="label">温度均值</div><div class="value">24.8</div><div class="unit">°C</div></div>
        <div class="stat-card"><div class="label">系统状态</div><div class="value" style="color:var(--accent);font-size:16px;">正常</div><div class="unit">—</div></div>
    </div>

    <div class="main-content">
        <div class="chart-container full-width">
            <div class="chart-title">📈 应变趋势监测</div>
            <div class="chart-box large" id="strainChart"></div>
        </div>

        <div class="chart-container full-width">
            <div class="chart-title">📐 倾斜趋势监测</div>
            <div class="chart-box large" id="tiltChart"></div>
        </div>

        <div class="chart-container full-width">
            <div class="chart-title">🌡️ 温度趋势监测</div>
            <div class="chart-box large" id="tempChart"></div>
        </div>

        <div class="chart-container full-width">
            <div class="chart-title">📍 沉降趋势监测</div>
            <div class="chart-box large" id="settleChart"></div>
        </div>
    </div>

    <footer class="footer-bar">
        <div class="info"><span>RSBIM 储罐结构安全智能监测系统 v2.0</span><span>数据更新: <span id="lastUpdate"></span></span></div>
        <div class="blink">● 系统运行正常</div>
    </footer>

    <script>
        const TANKS = [{id:'TANK-001',name:'1号储罐'},{id:'TANK-002',name:'2号储罐'},{id:'TANK-003',name:'3号储罐'},{id:'TANK-004',name:'4号储罐'},{id:'TANK-005',name:'5号储罐'}];
        const COLORS = {primary:'#00d4ff',accent:'#00ff88',warning:'#ffaa00',danger:'#ff4444',purple:'#a855f7'};
        
        function updateTime() {
            const el = document.getElementById('currentTime');
            if (el) el.textContent = new Date().toLocaleTimeString('zh-CN', {hour12:false});
            const u = document.getElementById('lastUpdate');
            if (u) u.textContent = new Date().toLocaleTimeString('zh-CN');
        }
        updateTime(); setInterval(updateTime, 1000);
        
        function createChart(id) {
            const div = document.getElementById(id); if (!div) return;
            const chart = echarts.init(div);
            chart.setOption({
                tooltip: {trigger:'axis',backgroundColor:'rgba(0,0,0,0.85)',textStyle:{color:'#fff'}},
                legend: {data:TANKS.map(t=>t.name),top:30,textStyle:{color:'#fff'}},
                grid: {left:'3%',right:'4%',bottom:'3%',top:'80px',containLabel:true},
                xAxis: {type:'category',boundaryGap:false,data:['00:00','04:00','08:00','12:00','16:00','20:00','24:00'],axisLine:{lineStyle:{color:'#666'}},axisLabel:{color:'#aaa'}},
                yAxis: {type:'value',axisLine:{lineStyle:{color:'#666'}},axisLabel:{color:'#aaa'},splitLine:{lineStyle:{color:'rgba(255,255,255,0.1)'}}},
                series: TANKS.map((t,i) => ({name:t.name,type:'line',smooth:true,data:Array.from({length:7},()=>Math.random()*20+5),lineStyle:{width:2},itemStyle:{color:[COLORS.primary,COLORS.accent,COLORS.warning,COLORS.danger,COLORS.purple][i]}}))
            });
            return chart;
        }
        
        const charts = [createChart('strainChart'), createChart('tiltChart'), createChart('tempChart'), createChart('settleChart')];
        window.addEventListener('resize', () => charts.forEach(c => c && c.resize()));
    </script>
</body>
</html>
