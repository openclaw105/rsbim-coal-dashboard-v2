<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史数据 - RSBIM 储罐监测</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="particles" id="particles"></div>

  <nav class="navbar">
    <div class="navbar-title">
      <span class="logo">🏭</span>
      RSBIM 储罐监测
    </div>
    <a href="index.html" class="nav-btn">
      <span class="nav-icon">🏠</span>首页
    </a>
    <a href="data.html" class="nav-btn">
      <span class="nav-icon">📊</span>综合数据
    </a>
    <a href="trends.html" class="nav-btn">
      <span class="nav-icon">📈</span>趋势监测
    </a>
    <a href="history.html" class="nav-btn active">
      <span class="nav-icon">📜</span>历史数据
    </a>
    <a href="sensors.html" class="nav-btn">
      <span class="nav-icon">📡</span>传感器运维
    </a>
    <a href="settings.html" class="nav-btn">
      <span class="nav-icon">⚙️</span>系统设置
    </a>
  </nav>

  <div class="page-container">
    <div class="card">
      <h2>📜 历史数据查询</h2>
      <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <select class="btn" id="tank-select">
          <option value="all">全部储罐</option>
          <option value="TANK-001">TANK-001</option>
          <option value="TANK-002">TANK-002</option>
          <option value="TANK-003">TANK-003</option>
          <option value="TANK-004">TANK-004</option>
          <option value="TANK-005">TANK-005</option>
        </select>
        <select class="btn" id="sensor-type-select">
          <option value="all">全部传感器类型</option>
          <option value="strain">应变传感器</option>
          <option value="tilt">倾斜传感器</option>
          <option value="settlement">沉降传感器</option>
          <option value="temperature">温度传感器</option>
        </select>
        <button class="btn btn-primary" onclick="queryHistory()">查询</button>
        <button class="btn" onclick="exportData()">导出</button>
      </div>

      <div class="chart-container" id="history-chart"></div>
    </div>

    <div class="card">
      <h2>📋 历史数据记录</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>时间</th>
            <th>储罐</th>
            <th>传感器类型</th>
            <th>数值</th>
            <th>单位</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="history-table-body">
          <!-- 数据由 JS 动态加载 -->
        </tbody>
      </table>
    </div>
  </div>

  <footer class="footer">
    <span>RSBIM 储罐结构安全智能监测系统 v2.0</span>
    <span class="blink">● 系统运行正常</span>
  </footer>

  <script src="echarts.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
