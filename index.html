<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSBIM 储罐结构安全智能监测系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 粒子背景 -->
  <div class="particles" id="particles"></div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-title">
      <span class="logo">🏭</span>
      RSBIM 储罐监测
    </div>
    <a href="index.html" class="nav-btn active">
      <span class="nav-icon">🏠</span>首页
    </a>
    <a href="data.html" class="nav-btn">
      <span class="nav-icon">📊</span>综合数据
    </a>
    <a href="trends.html" class="nav-btn">
      <span class="nav-icon">📈</span>趋势监测
    </a>
    <a href="history.html" class="nav-btn">
      <span class="nav-icon">📜</span>历史数据
    </a>
    <a href="sensors.html" class="nav-btn">
      <span class="nav-icon">📡</span>传感器运维
    </a>
    <a href="settings.html" class="nav-btn">
      <span class="nav-icon">⚙️</span>系统设置
    </a>
  </nav>

  <!-- 页面内容 -->
  <div class="page-container">
    <div class="card">
      <h2>🏭 储罐概览</h2>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px;">
        <div class="sensor-card">
          <div style="font-size: 24px; color: var(--accent-color);">5</div>
          <div style="font-size: 12px; color: var(--text-secondary);">储罐总数</div>
        </div>
        <div class="sensor-card">
          <div style="font-size: 24px; color: var(--success-color);">128</div>
          <div style="font-size: 12px; color: var(--text-secondary);">传感器数量</div>
        </div>
        <div class="sensor-card">
          <div style="font-size: 24px; color: var(--success-color);">99%</div>
          <div style="font-size: 12px; color: var(--text-secondary);">在线率</div>
        </div>
        <div class="sensor-card">
          <div style="font-size: 24px; color: var(--success-color);">正常</div>
          <div style="font-size: 12px; color: var(--text-secondary);">系统状态</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📊 实时监测</h2>
      <div class="chart-container" id="realtime-chart"></div>
    </div>

    <div class="card">
      <h2>🔔 告警信息</h2>
      <div id="alerts-list">
        <div style="padding: 10px; color: var(--success-color);">
          ✅ 当前无告警，所有传感器状态正常
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <span>RSBIM 储罐结构安全智能监测系统 v2.0</span>
    <span class="blink">● 系统运行正常</span>
  </footer>

  <script src="echarts.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
